name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build EXE
        shell: pwsh
        run: |
          try {
            .\scripts\build_windows_exe.ps1 -IncludeLocalDeps *>&1 | Tee-Object -FilePath build_windows_exe.log
            $code = $LASTEXITCODE
            if ($null -eq $code) { $code = 0 }
            if ($code -ne 0) { throw "build_windows_exe.ps1 failed with exit code $code" }
          } catch {
            $_ | Out-String | Tee-Object -FilePath build_windows_exe.log -Append
            throw
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs_${{ github.sha }}
          path: |
            build_windows_exe.log
            dist/AI_Live_Assistant/logs/**
          if-no-files-found: warn

      - name: Pack distributable zip
        if: success()
        shell: pwsh
        run: |
          $zipPath = "dist/AI_Live_Assistant_win_${{ github.sha }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/AI_Live_Assistant/*" -DestinationPath $zipPath -Force
          if (!(Test-Path $zipPath)) { throw "zip packaging failed: $zipPath" }
          Write-Host "Packaged zip: $zipPath"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Live_Assistant_win_${{ github.sha }}.zip
          path: dist/AI_Live_Assistant_win_${{ github.sha }}.zip
          if-no-files-found: error
