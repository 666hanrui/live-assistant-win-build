name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build EXE
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_exe.ps1 -IncludeLocalDeps

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Live_Assistant_win_${{ github.sha }}
          path: dist/AI_Live_Assistant/**
          if-no-files-found: error
