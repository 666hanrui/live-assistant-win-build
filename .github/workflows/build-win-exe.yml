name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build EXE
        shell: pwsh
        run: |
          try {
            .\scripts\build_windows_exe.ps1 -IncludeLocalDeps *>&1 | Tee-Object -FilePath build_windows_exe.log
            $code = $LASTEXITCODE
            if ($null -eq $code) { $code = 0 }
            if ($code -ne 0) { throw "build_windows_exe.ps1 failed with exit code $code" }
          } catch {
            $_ | Out-String | Tee-Object -FilePath build_windows_exe.log -Append
            throw
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs_${{ github.sha }}
          path: |
            build_windows_exe.log
            dist/AI_Live_Assistant/logs/**
          if-no-files-found: warn

      - name: Verify mock shop page packaged
        if: success()
        shell: pwsh
        run: |
          $candidates = @(
            "dist/AI_Live_Assistant/_internal/stress/mock_shop/mock_tiktok_shop.html",
            "dist/AI_Live_Assistant/stress/mock_shop/mock_tiktok_shop.html"
          )
          $hit = $null
          foreach ($p in $candidates) {
            if (Test-Path $p -PathType Leaf) {
              $hit = $p
              break
            }
          }
          if (-not $hit) {
            throw "mock_tiktok_shop.html not found in packaged bundle. checked=$($candidates -join '; ')"
          }
          $raw = Get-Content -Path $hit -Raw -Encoding UTF8
          if (($raw -notmatch "mock_tiktok_shop") -or ($raw -notmatch "dashboard_live")) {
            throw "mock page marker check failed: $hit"
          }
          Write-Host "Mock page verification passed: $hit"

      - name: Verify source guard metadata
        if: success()
        shell: pwsh
        run: |
          $buildInfo = "dist/AI_Live_Assistant/build_info.txt"
          if (!(Test-Path $buildInfo -PathType Leaf)) {
            throw "build_info.txt not found: $buildInfo"
          }
          $raw = Get-Content -Path $buildInfo -Raw -Encoding UTF8
          if ($raw -notmatch "source_guard=typing_trigger_strict_ocr_v1") {
            throw "source_guard marker missing in build_info.txt"
          }
          if ($raw -notmatch "main_py_sha256=[A-Fa-f0-9]{64}") {
            throw "main_py_sha256 missing or invalid in build_info.txt"
          }
          Write-Host "Source guard metadata verification passed: $buildInfo"

      - name: Pack distributable zip
        if: success()
        shell: pwsh
        run: |
          $zipPath = "dist/AI_Live_Assistant_win_${{ github.sha }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/AI_Live_Assistant/*" -DestinationPath $zipPath -Force
          if (!(Test-Path $zipPath)) { throw "zip packaging failed: $zipPath" }
          Write-Host "Packaged zip: $zipPath"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Live_Assistant_win_${{ github.sha }}.zip
          path: dist/AI_Live_Assistant_win_${{ github.sha }}.zip
          if-no-files-found: error
