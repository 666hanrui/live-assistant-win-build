name: Build And Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create GitHub Release"
        required: false
        default: false
        type: boolean
      tag_name:
        description: "Release tag to create/use when publishing manually"
        required: false
        default: ""
        type: string
      release_name:
        description: "Optional release title"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $isTagPush = "${{ startsWith(github.ref, 'refs/tags/') }}"
          $manualPublish = "${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}" -eq "true"
          $tagName = ""
          if ($isTagPush -eq "True") {
            $tagName = "${{ github.ref_name }}"
          } elseif ($manualPublish) {
            $tagName = "${{ inputs.tag_name }}"
          }
          $tagName = [string]$tagName
          if (($manualPublish) -and [string]::IsNullOrWhiteSpace($tagName)) {
            throw "workflow_dispatch publish_release=true requires tag_name"
          }

          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $releaseName = "${{ inputs.release_name }}"
          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            if (-not [string]::IsNullOrWhiteSpace($tagName)) {
              $releaseName = "AI Live Assistant $tagName"
            } else {
              $releaseName = "AI Live Assistant build $shortSha"
            }
          }

          $zipName = if ([string]::IsNullOrWhiteSpace($tagName)) {
            "AI_Live_Assistant_win_${shortSha}.zip"
          } else {
            "AI_Live_Assistant_win_${tagName}.zip"
          }
          $zipPath = "dist/$zipName"

          "publish_release=$($manualPublish -or ($isTagPush -eq 'True'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build EXE
        shell: pwsh
        run: |
          try {
            .\scripts\build_windows_exe.ps1 *>&1 | Tee-Object -FilePath build_windows_exe.log
            $code = $LASTEXITCODE
            if ($null -eq $code) { $code = 0 }
            if ($code -ne 0) { throw "build_windows_exe.ps1 failed with exit code $code" }
          } catch {
            $_ | Out-String | Tee-Object -FilePath build_windows_exe.log -Append
            throw
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs_${{ github.sha }}
          path: |
            build_windows_exe.log
            dist/AI_Live_Assistant/logs/**
          if-no-files-found: warn

      - name: Verify mock shop page packaged
        if: success()
        shell: pwsh
        run: |
          $candidates = @(
            "dist/AI_Live_Assistant/_internal/stress/mock_shop/mock_tiktok_shop.html",
            "dist/AI_Live_Assistant/stress/mock_shop/mock_tiktok_shop.html"
          )
          $hit = $null
          foreach ($p in $candidates) {
            if (Test-Path $p -PathType Leaf) {
              $hit = $p
              break
            }
          }
          if (-not $hit) {
            throw "mock_tiktok_shop.html not found in packaged bundle. checked=$($candidates -join '; ')"
          }
          $raw = Get-Content -Path $hit -Raw -Encoding UTF8
          if (($raw -notmatch "mock_tiktok_shop") -or ($raw -notmatch "dashboard_live")) {
            throw "mock page marker check failed: $hit"
          }
          Write-Host "Mock page verification passed: $hit"

      - name: Verify source guard metadata
        if: success()
        shell: pwsh
        run: |
          $buildInfo = "dist/AI_Live_Assistant/build_info.txt"
          if (!(Test-Path $buildInfo -PathType Leaf)) {
            throw "build_info.txt not found: $buildInfo"
          }
          $raw = Get-Content -Path $buildInfo -Raw -Encoding UTF8
          if ($raw -notmatch "source_guard=typing_trigger_strict_ocr_v1") {
            throw "source_guard marker missing in build_info.txt"
          }
          if ($raw -notmatch "main_py_sha256=[A-Fa-f0-9]{64}") {
            throw "main_py_sha256 missing or invalid in build_info.txt"
          }
          if ($raw -notmatch "dashboard_py_sha256=[A-Fa-f0-9]{64}") {
            throw "dashboard_py_sha256 missing or invalid in build_info.txt"
          }
          Write-Host "Source guard metadata verification passed: $buildInfo"

      - name: Pack distributable zip
        if: success()
        shell: pwsh
        run: |
          $zipPath = "${{ steps.meta.outputs.zip_path }}"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/AI_Live_Assistant/*" -DestinationPath $zipPath -Force
          if (!(Test-Path $zipPath)) { throw "zip packaging failed: $zipPath" }
          Write-Host "Packaged zip: $zipPath"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: ${{ steps.meta.outputs.zip_path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: success() && steps.meta.outputs.publish_release == 'True'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.zip_path }}
