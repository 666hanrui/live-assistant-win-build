name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build EXE
        shell: pwsh
        run: |
          .\scripts\build_windows_exe.ps1 -IncludeLocalDeps *>&1 | Tee-Object -FilePath build_windows_exe.log
          $code = $LASTEXITCODE
          if ($null -eq $code) { $code = 0 }
          if ($code -ne 0) { exit $code }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs_${{ github.sha }}
          path: |
            build_windows_exe.log
            dist/AI_Live_Assistant/logs/**
          if-no-files-found: warn

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Live_Assistant_win_${{ github.sha }}
          path: dist/AI_Live_Assistant/**
          if-no-files-found: error
